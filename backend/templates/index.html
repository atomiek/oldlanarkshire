<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Lanarkshire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="static/style.css" />
    <link rel="chatbotImage" type="image/x-icon" href="public/ChatbotIcon.svg">
    <link rel="icon" type="image/x-icon" href="public/favicon.ico">




    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>

         :root {
            --ink: #fff0bc;
            --parchment: #f5f0e8;
            --parchment-dark: #ede5d0;
            --sepia: #8b6914;
            --sepia-light: #c49a2a;
            --rust: #7a2f1a;
            --panel-width: 420px;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }


        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.6;
        }

        .page {
            position: relative;
            z-index: 1;
            transition: transform var(--transition);
        }

        .page.shifted {
            transform: translateX(calc(var(--panel-width) * -0.15));
        }


        nav a:hover { opacity: 1; }

        /* Chat trigger link in nav */
        nav a.chat-trigger {
            color: var(--rust);
            opacity: 0.9;
            border-bottom: 1px solid var(--rust);
            padding-bottom: 1px;
        }

        nav a.chat-trigger:hover { opacity: 1; }

       

        /*
           chat button
*/
        .chat-fab {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            background: var(--rust);
            color: var(--parchment);
            border: none;
            cursor: pointer;
            padding: 14px 10px;
            border-radius: 6px 0 0 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform var(--transition);
            box-shadow: -3px 0 12px rgba(0,0,0,0.15);
        }

        .chat-fab:hover {
            background: #9a3b20;
        }

        .chat-fab.panel-open {
            transform: translateY(-50%) translateX(var(--panel-width));
        }

        .chat-fab svg {
            width: 20px;
            height: 20px;
        }

        .chat-fab-label {
            font-family: arial, serif;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        /*
           chat panel
        */
        .chat-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: var(--panel-width);
            height: 100vh;
            background: #fff0bc;
            color: #000;
            z-index: 200;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform var(--transition);
            box-shadow: -8px 0 40px rgba(0,0,0,0.4);
        }

        .chat-panel.open {
            transform: translateX(0);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        .panel-header-left h2 {
            font-family: arial, serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: #000;
        }

        .panel-header-left p {
            font-size: 0.78rem;
            color: rgba(245, 240, 232, 0.45);
            margin-top: 3px;
            letter-spacing: 0.05em;
        }

        .panel-close {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--parchment);
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .panel-close:hover {
            background: rgba(255,255,255,0.1);
        }

        .panel-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel-messages::-webkit-scrollbar { width: 4px; }
        .panel-messages::-webkit-scrollbar-track { background: transparent; }
        .panel-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        /* Welcome state */
        .panel-welcome {
            text-align: center;
            padding: 40px 16px;
            color: #000;
        }

        .panel-welcome svg {
            width: 40px;
            height: 40px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .panel-welcome p {
            font-size: 0.9rem;
            line-height: 1.6;
        }


        .message {
            display: flex;
            animation: msgIn 0.3s ease-out;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .user-message { justify-content: flex-end; }
        .ai-message   { justify-content: flex-start; }

        .message-content {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 10px;
            line-height: 1.55;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .user-message .message-content {
            background: var(--rust);
            color: var(--parchment);
            border-bottom-right-radius: 3px;
        }

        .ai-message .message-content {
            background: rgba(255, 255, 255);
            color: #000;
            border-bottom-left-radius: 3px;
            border: 1px solid rgba(0,0,0,0.7);
        }


        .panel-input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .panel-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .panel-form input {
            flex: 1;
            background: rgba(0,0,0,);
            border: 1px solid rgba(0,0,0,0.5);
            border-radius: 120px;
            padding: 10px 14px;
            color: #000000;
            font-family: arial, serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .panel-form input::placeholder {
            color: rgba(0, 0, 0, 0.4);
        }

        .panel-form input:focus {
            border-color: rgba(196, 154, 42, 0.5);
        }

        .panel-form button {
            background: var(--rust);
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--parchment);
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel-form button:hover {
            background: #ffffff;
        }

        .panel-form button svg {
            width: 18px;
            height: 18px;
        }

        /* Loading */
        .panel-loading {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 6px 0 0;
            font-size: 0.8rem;
            color: rgba(245, 240, 232, 0.4);
        }

        .panel-loading.visible { display: flex; }

        .panel-spinner {
            width: 12px;
            height: 12px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-top-color: var(--sepia-light);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Backdrop ── */
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(10, 8, 5, 0.45);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }

        .backdrop.visible {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>
<body>

<!--placeholder html-->
<body>
<div id="container">
  <div id="header">
      <!-- Html there are ,,, because it makes it bigger -->
    <h1> ,,, </h1>
    <div class="Logo">
      <a target="_blank" href="Logo with text yellow.png">
       <img src="public/Logo with text yellow.png" alt="Logo" width="120" height="100">
      </a>
    </div>
  <!-- Html for the box that will stay in the middle for some text -->
  </div>
  <div id="hero">
    <article>Student Links </article>
  </div>
  <br><br><br><br>
  <!-- Html for the boxes that will link to diffent pages -->
    <div class="link-grid">
      <a class="link-card" href="#">
        <img src="public/EmailIcon.png" alt="Mail" class="card-image">
        <span>Old Mail</span>
      </a>
      <a class="link-card" href="templates/attendance.html">
        <img src="public/AttendanceIcon.png" alt="Attendance" class="card-image">
        <span>Attendance</span>
      </a>
      <a class="link-card" href="templates/Libary.html">
        <img src="public/BookmarkIcon.png" alt="Box 3" class="card-image">
        <span>Library</span>
      </a>
      <a class="link-card" href="#">
        <img src="public/MoodleIcon.png" alt="Box 4" class="card-image">
        <span>Moodle</span>
      </a>
      <a class="link-card" href="templates/help.html">
        <img src="public/questionmarkicon.png" alt="Box 5" class="card-image">
        <span>Help</span>
      </a>
      <a class="link-card" href="templates/Info.html">
        <img src="public/Logo tiny.png" alt="Box 6" class="card-image">
        <span>About the College</span>
      </a>
    </div>

<!--button-->
<button class="chat-fab" id="chatFab" onclick="openChat()" title="Open AI Chat" aria-label="Open chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <span class="chat-fab-label">Chat</span>
</button>


<div class="backdrop" id="backdrop" onclick="closeChat()"></div>


<!--chatbot stuff-->
<aside class="chat-panel" id="chatPanel" role="dialog" aria-label="AI Chat">

    <div class="panel-header">
        <div class="panel-header-left">
            <h2>Chatbot conversation</h2>
            <p>using llama.cpp</p>
        </div>
        <button class="panel-close" onclick="closeChat()" aria-label="Close chat">✕</button>
    </div>

    <div class="panel-messages" id="messages">
        <div class="panel-welcome" id="welcomeMsg">
      <img src="public/ChatbotIcon.svg" alt="Chatbot Logo" width="48" height="48"/>
            <p>The Chatbot may not be 100% accurate. Please remember to double check any information.</p>
        </div>
    </div>

    <div class="panel-input-area">
        <form class="panel-form"
              id="chat-form"
              hx-post="/chat"
              hx-target="#messages"
              hx-swap="beforeend"
              hx-on::after-request="if(event.detail.xhr.status === 200) { this.reset(); hideWelcome(); scrollMessages(); }">
            <input type="text"
                   name="prompt"
                   placeholder="Ask the Chatbot about anything"
                   required
                   autocomplete="off">
            <button type="submit" aria-label="Send">
                <!--stole this svg off the internet, too-->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </form>
        <div class="panel-loading" id="panelLoading">
            <div class="panel-spinner"></div>
        </div>
    </div>

</aside>


<script>
    const panel    = document.getElementById('chatPanel');
    const backdrop = document.getElementById('backdrop');
    const fab      = document.getElementById('chatFab');
    const form     = document.getElementById('chat-form');
    const loading  = document.getElementById('panelLoading');
    const page     = document.getElementById('page');

    function openChat() {
        panel.classList.add('open');
        backdrop.classList.add('visible');
        fab.classList.add('panel-open');
        page.classList.add('shifted');
        panel.querySelector('input').focus();
    }

    function closeChat() {
        panel.classList.remove('open');
        backdrop.classList.remove('visible');
        fab.classList.remove('panel-open');
        page.classList.remove('shifted');
    }

    function hideWelcome() {
        const w = document.getElementById('welcomeMsg');
        if (w) w.remove();
    }

    function scrollMessages() {
        const msgs = document.getElementById('messages');
        msgs.scrollTop = msgs.scrollHeight;
    }

    // htmx hooks
    form.addEventListener('htmx:xhr:loadstart', () => loading.classList.add('visible'));
    form.addEventListener('htmx:xhr:loadend',   () => {
        loading.classList.remove('visible');
        scrollMessages();
    });
//escape key closes the panel
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeChat(); });
</script>

</body>
</html>
